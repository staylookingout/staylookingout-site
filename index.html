<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TOOLS — STAYLOOKINGOUT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0B; --panel:#121214; --line:#232326;
    --txt:#E9E9EA; --muted:#6E6E76;
    --amber:#E8A33D; --teal:#3DC9C2;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--txt);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding:max(env(safe-area-inset-top),20px) 18px 60px;
    max-width:680px;margin:0 auto;
  }
  a{color:inherit;text-decoration:none}

  header{padding:16px 0 22px;border-bottom:1px solid var(--line)}
  .brand{font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:.14em}
  .brand span{color:var(--amber)}
  .sub{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:8px}

  .filter{display:flex;gap:6px;margin:20px 0 6px;flex-wrap:wrap}
  .filter button{
    font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;
    padding:9px 13px;border:1px solid var(--line);border-radius:6px;
    background:var(--panel);color:var(--muted);cursor:pointer;
  }
  .filter button.sel{border-color:var(--teal);color:var(--teal)}

  .grid{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .card{
    border:1px solid var(--line);border-radius:8px;background:var(--panel);
    padding:16px;display:block;transition:border-color .15s;
  }
  .card:active{border-color:#3A3A3E}
  .card .row{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .card h2{font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.08em}
  .card .cat{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.2em;color:var(--amber);white-space:nowrap}
  .card p{font-size:12.5px;line-height:1.55;color:var(--muted);margin-top:7px}
  .card .path{font-family:'JetBrains Mono';font-size:10px;color:#4A4A50;margin-top:9px}
  .card.soon{opacity:.45;pointer-events:none}
  .card.soon .cat{color:var(--muted)}

  footer{margin-top:44px;font-family:'JetBrains Mono';font-size:9px;letter-spacing:.22em;color:#3A3A3E;text-align:center}
</style>
</head>
<body>

<header>
  <div class="brand">STAYLOOKINGOUT<span>·</span>TOOLS</div>
  <div class="sub">INSTRUMENTS BUILT IN-HOUSE</div>
</header>

<div class="filter" id="filter"></div>
<div class="grid" id="grid"></div>

<footer>STAYLOOKINGOUT · MIAMI</footer>

<script>
/* ============================================================
   Add a tool: append one object here, upload the tool to
   tools/<slug>/index.html — that's the whole workflow.
   soon:true renders it dimmed and unclickable until it's live.
   ============================================================ */
const TOOLS=[
  {slug:'rig',       name:'RIG',                 cat:'CAMERA', desc:'Bluetooth control + HDMI field monitor for the BMPCC 6K Pro. Record, stills, ISO, shutter, WB, iris, focus, LUT preview, and WebGL assists (peaking, zebra, false color).'},
  {slug:'varispeed', name:'VARISPEED',           cat:'PITCH',  desc:'BPM and key calculator with 3D pitch-class and Camelot wheels for planning harmonic mixes and speed changes.'},
  {slug:'varispeed-processor', name:'VARISPEED PROCESSOR', cat:'PITCH', desc:'In-browser varispeed audio processing with WAV export — hear and render the speed/pitch change.'},
  {slug:'retune',    name:'RETUNE',              cat:'PITCH',  desc:'BPM and key conversion with WSOLA time-stretching for tempo changes without pitch shift.'},
  {slug:'stretch',   name:'STRETCH',             cat:'PITCH',  desc:'Phase-vocoder time-stretching with waveform scrubbing.'},
  {slug:'loop-console', name:'LOOP/CONSOLE',     cat:'AUDIO',  desc:'Loop editor with pinch-to-zoom, scrubbing, and per-point WAV export.'},
  {slug:'splice',    name:'SPLICE',              cat:'AUDIO',  desc:'Record, trim, and split audio with waveform editing; export WAV/MP3 or a zipped bundle.'},
  {slug:'stems',     name:'STEM SPLIT',          cat:'AUDIO',  desc:'Browser-based stem separation running MDX-Net models locally via ONNX Runtime — no upload, no server.'},
  {slug:'toolkit',   name:'TOOLKIT',             cat:'AUDIO',  desc:'Musician utility: tap tempo, key reference piano with scale detection, and a session log.'},
  {slug:'groove-lab',name:'GROOVE LAB',          cat:'AUDIO',  desc:'Rhythm sequencer with 18 documented grooves and the history behind each one.'},
];

const grid=document.getElementById('grid');
const filterEl=document.getElementById('filter');
const cats=['ALL',...new Set(TOOLS.map(t=>t.cat))];
let active='ALL';

function render(){
  filterEl.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.textContent=c;
    b.className=c===active?'sel':'';
    b.onclick=()=>{active=c;render();};
    filterEl.appendChild(b);
  });
  grid.innerHTML='';
  TOOLS.filter(t=>active==='ALL'||t.cat===active).forEach(t=>{
    const a=document.createElement('a');
    a.className='card'+(t.soon?' soon':'');
    a.href=t.slug+'/';
    a.innerHTML=
      '<div class="row"><h2>'+t.name+'</h2><span class="cat">'+(t.soon?'SOON':t.cat)+'</span></div>'+
      '<p>'+t.desc+'</p>'+
      '<div class="path">/tools/'+t.slug+'/</div>';
    grid.appendChild(a);
  });
}
render();
</script>
</body>
</html>
