<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STAY Terminal — staylookingout.com</title>
<meta name="description" content="staylookingout/tools/ — instruments built in-house.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Special+Gothic+Condensed+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0a14;
    --fg:#e6e2f0;
    --dim:#6d6a86;
    --line:#2c2740;
    --pink:#ff7edb;
    --cyan:#36f9f6;
    --orange:#ff9a4d;
    --red:#fe5f75;
    --green:#72f1b8;
    --yellow:#fede5d;
    --purple:#b893e6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  a{color:var(--cyan);text-decoration:none;}
  a:hover{color:var(--pink);}

  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @keyframes glitchIn{
    0%{clip-path:inset(42% 0 42% 0);transform:translateX(-14px) skewX(10deg);filter:hue-rotate(120deg) saturate(3);opacity:.4;}
    18%{clip-path:inset(8% 0 72% 0);transform:translateX(10px);opacity:.7;}
    36%{clip-path:inset(62% 0 4% 0);transform:translateX(-7px) skewX(-7deg);}
    54%{clip-path:inset(18% 0 46% 0);transform:translateX(5px);filter:hue-rotate(-60deg);}
    72%{clip-path:inset(2% 0 12% 0);transform:translateX(-3px);}
    86%{clip-path:inset(0 0 0 0);transform:translateX(2px);}
    100%{clip-path:inset(0 0 0 0);transform:none;filter:none;opacity:1;}
  }
  @keyframes glitchOut{
    0%{clip-path:inset(0 0 0 0);transform:none;opacity:1;}
    25%{clip-path:inset(12% 0 55% 0);transform:translateX(8px) skewX(-8deg);filter:hue-rotate(90deg);}
    50%{clip-path:inset(58% 0 10% 0);transform:translateX(-10px);}
    75%{clip-path:inset(30% 0 30% 0);transform:translateX(14px) skewX(10deg);opacity:.5;}
    100%{clip-path:inset(48% 0 48% 0);transform:translateX(-20px);opacity:0;}
  }

  #root{
    min-height:100vh;
    background:var(--bg);
    font-family:'JetBrains Mono',monospace;
    color:var(--fg);
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:text;
  }
  #root.glitch{animation:glitchIn 0.9s steps(14) both;}
  #root.out{animation:glitchOut 0.5s steps(10) forwards;}

  #wrap{
    width:100%;
    max-width:840px;
    padding:44px 22px 60px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  @keyframes breathe{
    0%,100%{ text-shadow: 0 0 6px rgba(230,226,240,0.25), 0 0 16px rgba(54,249,246,0.12); }
    50%{ text-shadow: 0 0 14px rgba(230,226,240,0.5), 0 0 32px rgba(54,249,246,0.32), 0 0 52px rgba(255,126,219,0.14); }
  }
  #logo{
    font-family:'Special Gothic Condensed One', sans-serif;
    font-size:52px;
    line-height:1;
    letter-spacing:0.5px;
    color:#f2f0f8;
    margin-bottom:2px;
    user-select:none;
    display:block;
    animation: breathe 4.5s ease-in-out infinite;
  }
  #subtitle{color:var(--dim);font-size:13px;letter-spacing:1.5px;margin-bottom:26px;}

  .term-line{
    font-size:15px;
    line-height:1.85;
    word-break:break-word;
    padding:0 8px;
    margin:0 -8px;
    border-radius:3px;
    background:transparent;
  }
  .term-line.clickable{cursor:pointer;}
  .term-line span{white-space:pre-wrap;}

  #promptRow{
    display:flex;
    flex-wrap:wrap;
    font-size:15px;
    line-height:1.85;
    padding:0 8px;
    margin:2px -8px 0;
  }
  #promptRow.hidden{display:none;}
  #promptLabel{color:var(--green);white-space:pre;text-shadow:0 0 10px rgba(114,241,184,0.35);}
  #typedText{color:var(--fg);white-space:pre-wrap;}
  #caret{color:var(--cyan);animation:blink 1.1s steps(1) infinite;text-shadow:0 0 9px rgba(54,249,246,0.8);}
  #ghost{color:#443f5c;white-space:pre;}

  #musicBtn{
    position:fixed;top:14px;right:14px;
    background:none;
    border:1px solid var(--line);
    color:var(--dim);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    padding:5px 10px;
    border-radius:3px;
    cursor:pointer;
    letter-spacing:1px;
  }
  #musicBtn:hover{color:var(--cyan);border-color:var(--cyan);}

  #mobileInput{
    position:fixed;bottom:0;left:0;
    width:2px;height:2px;
    opacity:0.01;
    border:none;background:transparent;color:transparent;caret-color:transparent;
  }
</style>
</head>
<body>
<div id="root" class="glitch">
  <div id="wrap">
    <div id="logo">STAY</div>
    <div id="subtitle">staylookingout/tools/</div>
    <div id="lines"></div>
    <div id="promptRow" class="hidden">
      <span id="promptLabel"></span>
      <span id="typedText"></span>
      <span id="caret">&#9608;</span>
      <span id="ghost"></span>
    </div>
  </div>
  <button id="musicBtn" type="button">&#9834; off</button>
  <input id="mobileInput" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<script>
(function(){
  "use strict";

  var PAL = { pink:'#ff7edb', cyan:'#36f9f6', orange:'#ff9a4d', red:'#fe5f75', green:'#72f1b8', yellow:'#fede5d', purple:'#b893e6', dim:'#6d6a86', fg:'#e6e2f0' };
  var COLORS = ['#ff7edb','#36f9f6','#ff9a4d','#72f1b8','#fede5d','#b893e6','#fe5f75'];
  var GLYPHS = '!<>-_\\/[]{}=+*^?#@%&';
  var promptPath = 'tools';
  var promptPathColor = PAL.yellow;
  var TEMPO = 130;
  var BEAT_GLOW = true;

  // Edit this list to point your real tools at real URLs.
  var PAGES = [
    { name:'chop',      url:'https://staylookingout.com/',       desc:'in/out point' },
    { name:'bpmkey',    url:'https://staylookingout.com/tools/bpmkey.html', desc:'BPM / key detection tool' },
    { name:'varispeed', url:'https://staylookingout.com/tools/', desc:'pitch/time stretch' },
    { name:'retune',    url:'#', desc:'any song' },
    { name:'record',    url:'#', desc:'anything playing', color:'#fe5f75' },
    { name:'playlist',  url:'#', desc:'play/filter songs' },
    { name:'bmpcc',     url:'https://staylookingout.github.io/staylookingout-site/tools/rig/', desc:'BMPCC camera control app' }
  ];

  // Shown instead of PAGES when the prompt is sitting in user:/read
  var READ_PAGES = [
    { name:'character', url:'#', desc:'people in religious text' },
    { name:'parable',   url:'#', desc:'lessons from around the world' },
    { name:'waves',     url:'#', desc:'light/audio relationship' }
  ];

  function currentPages(){ return promptPath === 'read' ? READ_PAGES : PAGES; }

  var root = document.getElementById('root');
  var linesEl = document.getElementById('lines');
  var promptRow = document.getElementById('promptRow');
  var promptLabelEl = document.getElementById('promptLabel');
  var typedTextEl = document.getElementById('typedText');
  var ghostEl = document.getElementById('ghost');
  var musicBtn = document.getElementById('musicBtn');
  var mobileInput = document.getElementById('mobileInput');

  var state = {
    lines: [],
    typed: '',
    phase: 'glitch',
    sel: -1,
    activeListGen: -1,
    muted: false,
    showPrompt: false,
    ranOnce: false,
    out: false
  };

  var listGen = 0;
  var timers = [];
  var audioLoop = null;
  var ac = null, master = null, delay = null, prog = [], arp = [], step = 0;

  // ---------- helpers ----------
  function rnd(n){ var s=''; for (var i=0;i<n;i++) s += GLYPHS[Math.floor(Math.random()*GLYPHS.length)]; return s; }
  function hashColor(w){ var h=0; for (var i=0;i<w.length;i++) h=(h*31+w.charCodeAt(i))>>>0; return COLORS[h % COLORS.length]; }
  function colorize(text){
    return text.split(/(\s+)/).filter(function(t){ return t.length; }).map(function(t){
      if (/^\s+$/.test(t)) return { t:t, c:PAL.fg };
      if (/^[.\/\\:;,(){}\[\]<>=+"'`~-]+$/.test(t)) return { t:t, c:PAL.dim };
      return { t:t, c:hashColor(t) };
    });
  }

  // ---------- rendering ----------
  function renderPromptRow(){
    promptRow.classList.toggle('hidden', !state.showPrompt);
    promptLabelEl.innerHTML = '';
    var prefixSpan = document.createElement('span');
    prefixSpan.textContent = 'user:/';
    prefixSpan.style.color = PAL.green;
    var pathSpan = document.createElement('span');
    pathSpan.textContent = promptPath;
    pathSpan.style.color = promptPathColor;
    promptLabelEl.appendChild(prefixSpan);
    promptLabelEl.appendChild(pathSpan);
    promptLabelEl.appendChild(document.createTextNode(' '));
    typedTextEl.textContent = state.typed;
    ghostEl.textContent = (state.typed === '' && !state.ranOnce) ? "  type 'list' + \u21B5" : '';
  }

  function updateRootAnim(){
    root.classList.remove('glitch','out');
    if (state.out) root.classList.add('out');
    else if (state.phase === 'glitch') root.classList.add('glitch');
  }

  function updateMusicLabel(){
    musicBtn.textContent = (state.muted || !ac) ? '\u266A off' : '\u266A on';
  }

  function scrollDown(){
    requestAnimationFrame(function(){ window.scrollTo(0, document.body.scrollHeight); });
  }

  function setSelHighlight(newSel){
    state.lines.forEach(function(ln){
      if (ln.pageIdx === undefined || ln.list !== state.activeListGen) return;
      if (ln.pageIdx === newSel) ln.el.style.background = 'rgba(54,249,246,0.09)';
      else ln.el.style.background = 'transparent';
    });
    state.sel = newSel;
  }

  // spans: [{t, c, w, sh}], extra: {click, pageIdx, cursor}, scramble: bool
  function pushLine(spans, extra, scramble){
    var line = Object.assign({
      spans: spans.map(function(s){
        return Object.assign({ w:400, sh:'none', disp: scramble ? rnd(s.t.length) : s.t }, s);
      })
    }, extra || {});

    var lineEl = document.createElement('div');
    lineEl.className = 'term-line';
    if (line.pageIdx !== undefined) lineEl.dataset.pageIdx = line.pageIdx;
    if (line.click){
      lineEl.classList.add('clickable');
      lineEl.addEventListener('click', line.click);
    }
    line.spans.forEach(function(sp){
      var spanEl = document.createElement('span');
      spanEl.textContent = sp.disp;
      spanEl.style.color = sp.c;
      spanEl.style.fontWeight = sp.w;
      spanEl.style.textShadow = sp.sh;
      lineEl.appendChild(spanEl);
      sp.el = spanEl;
    });
    line.el = lineEl;
    linesEl.appendChild(lineEl);
    state.lines.push(line);
    scrollDown();

    if (scramble){
      var f = 0, frames = 6;
      var iv = setInterval(function(){
        f++;
        line.spans.forEach(function(sp){
          var n = Math.ceil(sp.t.length * f / frames);
          sp.disp = sp.t.slice(0, n) + (f >= frames ? '' : rnd(sp.t.length - n));
          sp.el.textContent = sp.disp;
        });
        if (f >= frames) clearInterval(iv);
      }, 30);
      timers.push(iv);
    }
    return line;
  }
  function sys(text, c, extra){ return pushLine([{ t:text, c: c || PAL.dim }], extra); }

  function clearLines(){
    linesEl.innerHTML = '';
    state.lines = [];
    state.sel = -1;
    state.activeListGen = -1;
  }

  // ---------- boot sequence ----------
  function boot(){
    var seq = [
      [90,  function(){ pushLine([{ t:'> ACCESS GRANTED', c:PAL.green, w:700, sh:'0 0 12px rgba(114,241,184,0.8)' }], null, true); }],
      [230, function(){
        var spans = colorize('import Read from "./core/stay";');
        spans.forEach(function(sp){ if (sp.t === 'Read') sp.c = PAL.purple; });
        pushLine(spans, null, true);
      }],
      [120, function(){ pushLine(colorize('import Tools from "./tools/index";'), null, true); }],
      [120, function(){ pushLine(colorize('decrypt /vault/keys ............ OK'), null, true); }],
      [120, function(){ pushLine(colorize('link staylookingout.com ........ OK'), null, true); }],
      [160, function(){ sys('> File loaded: src/core/main.js'); }],
      [220, function(){ state.phase = 'ready'; state.showPrompt = true; renderPromptRow(); updateRootAnim(); focusInput(); }]
    ];
    var t = 0;
    seq.forEach(function(entry){
      t += entry[0];
      timers.push(setTimeout(entry[1], t));
    });
  }

  // ---------- input ----------
  function focusInput(){ mobileInput.focus({ preventScroll:true }); }

  mobileInput.addEventListener('input', function(e){
    var v = e.target.value;
    if (v && state.phase === 'ready'){ state.typed += v; renderPromptRow(); }
    e.target.value = '';
  });

  function onKey(e){
    if (state.phase !== 'ready' || state.out || e.metaKey || e.ctrlKey || e.altKey) return;
    var linkLines = state.lines.filter(function(l){ return l.pageIdx !== undefined && l.list === state.activeListGen; });
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp'){
      if (!linkLines.length) return;
      e.preventDefault();
      var idxs = linkLines.map(function(l){ return l.pageIdx; });
      var p = idxs.indexOf(state.sel);
      p = e.key === 'ArrowDown' ? (p+1) % idxs.length : (p-1+idxs.length) % idxs.length;
      setSelHighlight(idxs[p]);
    } else if (e.key === 'Enter'){
      e.preventDefault();
      var cmd = state.typed.trim();
      if (cmd){ state.typed=''; state.ranOnce=true; renderPromptRow(); run(cmd); }
      else if (state.sel >= 0) openPage(state.sel);
    } else if (e.key === 'Backspace'){
      e.preventDefault();
      state.typed = state.typed.slice(0, -1);
      renderPromptRow();
    } else if (e.key.length === 1){
      e.preventDefault();
      state.typed += e.key;
      renderPromptRow();
    }
  }
  window.addEventListener('keydown', onKey);

  root.addEventListener('click', focusInput);

  // ---------- commands ----------
  function echoCmd(cmd){
    pushLine([
      { t:'user:/', c:PAL.green },
      { t:promptPath + ' ', c:promptPathColor },
      { t:cmd, c:PAL.fg }
    ]);
  }

  function run(raw){
    echoCmd(raw);
    var cmd = raw.toLowerCase();
    var parts = cmd.split(/\s+/);
    var head = parts[0];
    var rest = parts.slice(1);
    var arg = rest.join(' ');
    var P = PAL;
    var num = parseInt(cmd, 10);
    var byName = currentPages().findIndex(function(p){
      return p.name === cmd || (p.name === arg && (head === 'open' || head === 'cd' || head === 'go'));
    });

    if (cmd === 'home' || cmd === 'cls') {
      sys('reloading reality...', P.orange);
      setTimeout(function(){ location.reload(); }, 600);
      return;
    }
    if (cmd === 'tools') {
      promptPath = 'tools';
      promptPathColor = PAL.yellow;
      renderPromptRow();
      return;
    }
    if (cmd === 'list' || cmd === 'ls' || cmd === 'dir') return showList();
    if (!isNaN(num) && num >= 1 && num <= currentPages().length && String(num) === cmd) return openPage(num - 1);
    if (byName >= 0) return openPage(byName);

    switch (head){
      case 'help':
        sys('\u2500\u2500 commands \u2500\u2500', P.purple);
        [['list','show all pages'],['open <name|#>','jump to a page'],['about','what is this place'],
         ['contact','reach out'],['whoami','identify yourself'],['stay','...'],['clear','wipe the screen'],
         ['reload','refresh reality'],['music on|off','toggle the chiptune'],['echo <text>','shout into the void'],
         ['exit','try it']].forEach(function(pair){
          pushLine([{ t:'  ' + pair[0].padEnd(16), c:P.cyan }, { t:pair[1], c:P.dim }]);
        });
        return;
      case 'clear': return clearLines();
      case 'about':
        sys('STAYLOOKINGOUT \u00B7 MIAMI', P.pink);
        sys('instruments built in-house. tools, experiments, transmissions.', P.dim);
        return;
      case 'contact':
        pushLine([{ t:'signal \u25B8 ', c:P.dim }, { t:'stay@staylookingout.com', c:P.cyan, sh:'0 0 10px rgba(54,249,246,0.4)' }],
          { click:function(){ location.href = 'mailto:stay@staylookingout.com'; }, cursor:'pointer' });
        return;
      case 'read':
        promptPath = 'read';
        promptPathColor = PAL.purple;
        renderPromptRow();
        return;
      case 'whoami': return sys('guest \u2014 but you were never really here.', P.yellow);
      case 'sudo': return sys('permission denied. nice try, root.', P.red);
      case 'stay': return arg === 'looking out' ? lookingOut() : sys('stay what?', P.pink);
      case 'print': return arg === 'looking out' ? lookingOut() : sys('print what? (hint: what should you stay doing?)', P.dim);
      case 'looking': if (arg === 'out') return lookingOut(); break;
      case 'reload':
        sys('reloading reality...', P.orange);
        setTimeout(function(){ location.reload(); }, 600);
        return;
      case 'exit': case 'quit': case 'logout': return sys('there is no exit. stay.', P.red);
      case 'echo': return pushLine(colorize(arg || '...'));
      case 'date': case 'time': return sys(new Date().toString(), P.green);
      case 'rm': return sys('these files are load-bearing. denied.', P.red);
      case 'matrix': return sys('wake up... this terminal IS the matrix.', P.green);
      case 'music':
        if (arg === 'off'){ setMute(true); return sys('music: off', P.dim); }
        if (arg === 'new'){
          initAudio();
          regenerateMelody();
          setMute(false);
          return sys('music: new melody \u266A', P.cyan);
        }
        if (arg === 'save'){ saveMelody(); return; }
        initAudio(); setMute(false); return sys('music: on \u266A', P.cyan);
      case 'open': case 'cd': case 'go':
        return sys('no page called "' + arg + '" \u2014 type list', P.red);
    }
    sys('command not found: ' + head + ' \u2014 type help', P.red);
  }

  function lookingOut(){
    pushLine([{ t:'LOOKING OUT.', c:PAL.cyan, w:700, sh:'0 0 14px rgba(54,249,246,0.9), 0 0 44px rgba(255,126,219,0.6)' }], null, true);
  }

  function showList(){
    var gen = ++listGen;
    sys('\u2500\u2500 pages \u2500\u2500', PAL.purple);
    currentPages().forEach(function(p, i){
      pushLine([
        { t:'  ' + (i+1) + '  ', c:PAL.dim },
        { t:p.name.padEnd(10), c:p.color || COLORS[i % COLORS.length], w:500 },
        { t:p.desc, c:PAL.dim }
      ], { pageIdx:i, list:gen, click:function(){ openPage(i); }, cursor:'pointer' });
    });
    sys('\u2191\u2193 + enter, click, or type a name / number', PAL.dim);
    state.activeListGen = gen;
    setSelHighlight(0);
  }

  function openPage(i){
    var p = currentPages()[i];
    if (!p) return;
    if (p.url === '#') return sys('// "' + p.name + '" is an empty slot \u2014 give me its URL', PAL.orange);
    sys('> jacking into ' + p.name + ' ...', PAL.cyan);
    state.out = true;
    updateRootAnim();
    setTimeout(function(){ window.location.href = p.url; }, 520);
  }

  // ---------- generative synth audio ----------
  function regenerateMelody(){
    var roots = [0, -2, -4, 3, -7, 5];
    prog = Array.from({ length:4 }, function(){ return roots[Math.floor(Math.random()*roots.length)]; });
    prog[0] = 0;
    var minor = [0, 3, 7, 10, 12, 15];
    arp = Array.from({ length:16 }, function(){ return Math.random() < 0.25 ? null : minor[Math.floor(Math.random()*minor.length)]; });
    step = 0;
  }

  function initAudio(){
    if (ac) return;
    try { ac = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e){ return; }

    master = ac.createGain();
    master.gain.value = state.muted ? 0 : 0.16;
    master.connect(ac.destination);

    delay = ac.createDelay(1); delay.delayTime.value = 0.38;
    var fb = ac.createGain(); fb.gain.value = 0.38;
    var wet = ac.createGain(); wet.gain.value = 0.3;
    delay.connect(fb); fb.connect(delay); delay.connect(wet); wet.connect(master);

    regenerateMelody();

    audioLoop = setInterval(tick, 60000 / TEMPO / 4);
    updateMusicLabel();
  }

  function voice(type, freq, when, dur, vol, cutoff, toDelay, tCtx, tMaster, tDelay){
    tCtx = tCtx || ac; tMaster = tMaster || master; tDelay = tDelay || delay;
    var o = tCtx.createOscillator(), g = tCtx.createGain(), f = tCtx.createBiquadFilter();
    o.type = type; o.frequency.value = freq;
    f.type = 'lowpass';
    f.frequency.setValueAtTime(cutoff, when);
    f.frequency.exponentialRampToValueAtTime(Math.max(80, cutoff*0.25), when + dur);
    f.Q.value = 4;
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(vol, when + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, when + dur);
    o.connect(f); f.connect(g); g.connect(tMaster);
    if (toDelay) g.connect(tDelay);
    o.start(when); o.stop(when + dur + 0.05);
  }

  // One 16th-step of the pattern. Drives live playback (ac/master/delay) or
  // an offline render (tCtx/tMaster/tDelay) using the same prog/arp data.
  function scheduleStep(s, t, tCtx, tMaster, tDelay){
    tCtx = tCtx || ac; tMaster = tMaster || master; tDelay = tDelay || delay;
    var bar = Math.floor(s/16) % 4, root = prog[bar];
    function rf(semi, base){ return base * Math.pow(2, (root+semi)/12); }

    if (s % 16 === 0){
      var barDur = (60000/TEMPO/4)*16/1000;
      voice('sawtooth', rf(0,110)*0.997, t, barDur, 0.05, 500, true, tCtx, tMaster, tDelay);
      voice('sawtooth', rf(3,110)*1.004, t, barDur, 0.04, 420, true, tCtx, tMaster, tDelay);
    }
    if (s % 8 === 0) voice('sawtooth', rf(0,55), t, 0.9, 0.32, 240, false, tCtx, tMaster, tDelay);
    if (s % 4 === 0){
      var o = tCtx.createOscillator(), g = tCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(110, t);
      o.frequency.exponentialRampToValueAtTime(38, t + 0.14);
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.connect(g); g.connect(tMaster); o.start(t); o.stop(t + 0.25);
    }
    var a = arp[s % 16];
    if (a !== null) voice('square', rf(a,110), t, 0.22, 0.07, 750, true, tCtx, tMaster, tDelay);
    if (s % 8 === 6){
      var b = tCtx.createBuffer(1, 900, tCtx.sampleRate), d = b.getChannelData(0);
      for (var i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
      var src = tCtx.createBufferSource(), g2 = tCtx.createGain(), f2 = tCtx.createBiquadFilter();
      f2.type = 'lowpass'; f2.frequency.value = 5000;
      src.buffer = b; g2.gain.value = 0.07;
      src.connect(f2); f2.connect(g2); g2.connect(tMaster); src.start(t);
    }
  }

  function tick(){
    var t = ac.currentTime + 0.03, s = step;
    scheduleStep(s, t);
    if (s % 4 === 0) onBeat();
    step++;
  }

  // ---------- render current melody to a downloadable WAV ----------
  function renderMelodyToWav(numBars, done){
    var OfflineCtor = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if (!OfflineCtor) { done(null); return; }
    var stepDur = 60 / TEMPO / 4;
    var totalSteps = numBars * 16;
    var tailSec = 1.5; // let the delay/feedback trail ring out
    var totalDur = totalSteps * stepDur + tailSec;
    var sampleRate = 44100;
    var offlineCtx = new OfflineCtor(2, Math.ceil(totalDur * sampleRate), sampleRate);

    var oMaster = offlineCtx.createGain();
    oMaster.gain.value = 0.16;
    oMaster.connect(offlineCtx.destination);
    var oDelay = offlineCtx.createDelay(1); oDelay.delayTime.value = 0.38;
    var oFb = offlineCtx.createGain(); oFb.gain.value = 0.38;
    var oWet = offlineCtx.createGain(); oWet.gain.value = 0.3;
    oDelay.connect(oFb); oFb.connect(oDelay); oDelay.connect(oWet); oWet.connect(oMaster);

    for (var s = 0; s < totalSteps; s++){
      scheduleStep(s, s * stepDur + 0.05, offlineCtx, oMaster, oDelay);
    }

    offlineCtx.startRendering().then(function(buffer){ done(buffer); }).catch(function(){ done(null); });
  }

  function audioBufferToWav(buffer){
    var numChannels = buffer.numberOfChannels, sampleRate = buffer.sampleRate;
    var bytesPerSample = 2, blockAlign = numChannels * bytesPerSample;
    var dataLength = buffer.length * blockAlign;
    var arrBuf = new ArrayBuffer(44 + dataLength);
    var view = new DataView(arrBuf);
    function writeStr(offset, str){ for (var i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i)); }
    writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataLength, true); writeStr(8, 'WAVE');
    writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true); view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true);
    writeStr(36, 'data'); view.setUint32(40, dataLength, true);

    var channels = [];
    for (var c = 0; c < numChannels; c++) channels.push(buffer.getChannelData(c));
    var offset = 44;
    for (var i = 0; i < buffer.length; i++){
      for (var c2 = 0; c2 < numChannels; c2++){
        var sample = Math.max(-1, Math.min(1, channels[c2][i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }
    }
    return new Blob([arrBuf], { type:'audio/wav' });
  }

  function downloadBlob(blob, filename){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
  }

  function saveMelody(){
    if (!prog.length) regenerateMelody();
    sys('rendering melody to wav...', PAL.cyan);
    renderMelodyToWav(8, function(buffer){
      if (!buffer){ sys('rendering failed \u2014 try a different browser', PAL.red); return; }
      var blob = audioBufferToWav(buffer);
      var filename = 'staylookingout-melody-' + Date.now() + '.wav';
      downloadBlob(blob, filename);
      sys('saved: ' + filename, PAL.green);
    });
  }

  function onBeat(){
    if (!BEAT_GLOW || state.muted) return;
    if (Math.random() > 0.22) return;
    var lines = state.lines;
    if (!lines.length) return;
    var ln = lines[Math.floor(Math.random()*lines.length)];
    var sp = ln.spans[Math.floor(Math.random()*ln.spans.length)];
    if (!sp || /^\s+$/.test(sp.t)) return;
    var prev = sp.sh;
    sp.sh = '0 0 10px ' + sp.c + ', 0 0 26px ' + sp.c;
    sp.el.style.textShadow = sp.sh;
    setTimeout(function(){
      sp.sh = prev === undefined ? 'none' : prev;
      sp.el.style.textShadow = sp.sh;
    }, 320);
  }

  function setMute(m){
    state.muted = m;
    if (master) master.gain.value = m ? 0 : 0.11;
    updateMusicLabel();
  }
  function toggleMusic(){ initAudio(); setMute(!state.muted); }

  musicBtn.addEventListener('click', toggleMusic);
  window.addEventListener('pointerdown', function once(){ initAudio(); window.removeEventListener('pointerdown', once); }, { once:true });
  window.addEventListener('keydown', function once(){ initAudio(); window.removeEventListener('keydown', once); }, { once:true });

  // ---------- go ----------
  renderPromptRow();
  updateRootAnim();
  updateMusicLabel();
  timers.push(setTimeout(function(){
    state.phase = 'boot';
    updateRootAnim();
    boot();
  }, 950));

})();
</script>
</body>
</html>
